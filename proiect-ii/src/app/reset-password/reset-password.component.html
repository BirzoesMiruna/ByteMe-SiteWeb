<form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
  <label>Email:</label>
  <input formControlName="email" type="email" />
  <div *ngIf="resetPasswordForm.get('email')?.invalid && resetPasswordForm.get('email')?.touched">
    Email invalid.
  </div>

  <label>Token:</label>
  <input formControlName="token" type="text" />
  <div *ngIf="resetPasswordForm.get('token')?.invalid && resetPasswordForm.get('token')?.touched">
    Token-ul este obligatoriu.
  </div>

  <label>Parola nouă:</label>
  <input formControlName="newPassword" type="password" />
  <div *ngIf="resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched">
    Parola este obligatorie.
  </div>

  <button type="submit" [disabled]="resetPasswordForm.invalid">Resetează parola</button>
</form>

<p *ngIf="message" style="color: green;">{{ message }}</p>
<p *ngIf="error" style="color: red;">{{ error }}</p>
