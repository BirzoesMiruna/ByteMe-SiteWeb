<section class="contact-section">
  <div class="container">
    <h1 class="section-title">Hai să vorbim!</h1>
    <p class="contact-slogan">"Împărtășim gusturi. Creăm povești delicioase. 🍽️"</p>

    <form class="contact-form">
      <div class="input-group">
        <span class="input-icon">
          <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png" alt="user icon">
        </span>
        <input type="text" placeholder="Nume">
      </div>
      <div class="input-group">
        <span class="input-icon">
          <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="email icon">
        </span>
        <input type="email" placeholder="Email">
      </div>
      <div class="input-group">
        <span class="input-icon">
          <img src="https://cdn-icons-png.flaticon.com/512/929/929564.png" alt="subject icon">
        </span>
        <input type="text" placeholder="Subiect">
      </div>
      <div class="input-group">
        <span class="input-icon">
          <img src="https://cdn-icons-png.flaticon.com/512/1055/1055646.png" alt="message icon">
        </span>
        <textarea placeholder="Mesaj"></textarea>
      </div>
      <button type="submit" class="btn">Trimite Mesaj</button>
    </form>
  </div>
</section>
